# .github/workflows/python-package.yml

name: Nabees Movie API

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest
    
    - name: Create .env file from secrets
      run: |
        echo "API_TOKEN=${{ secrets.API_TOKEN }}" >> .env
        echo "COOKIE_TOKEN=${{ secrets.COOKIE_TOKEN }}" >> .env
        echo "COOKIE_GA=${{ secrets.COOKIE_GA }}" >> .env
        echo "COOKIE_GA2=${{ secrets.COOKIE_GA2 }}" >> .env
        echo "COOKIE_UUID=${{ secrets.COOKIE_UUID }}" >> .env
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Start app.py in background
      run: |
        python app.py &
        sleep 5
    
    - name: Test if app is running
      run: |
        curl -s http://localhost:5000/health || echo "App not responding"
    
    - name: Stop app
      run: |
        pkill -f "python app.py" || true
